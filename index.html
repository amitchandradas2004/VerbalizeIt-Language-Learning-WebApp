<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Raleway:ital,wght@0,100..900;1,100..900&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/daisyui@5"
      rel="stylesheet"
      type="text/css"
    />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <title>VerbalizeIt-Language-Learning-WebApp</title>
    <link rel="shortcut icon" href="./Assets/icon.png" type="image/x-icon" />
    k
    <link rel="stylesheet" href="./tailwind.css" />
  </head>
  <body class="raleway">
    <header>
      <nav class="fixed top-0 z-10 w-full shadow-sm bg-gray-200">
        <div
          class="flex justify-between py-1.5 items-center px-2 md:px-0 container mx-auto"
        >
          <h2 class="text-2xl md:text-3xl font-bold">VerbalizeIt</h2>
          <div
            class="flex justify-between gap-5 text-xs font-medium hidden md:inline-flex"
          >
            <p>Service</p>
            <p>Blog</p>
            <p>About Us</p>
            <p>Contact</p>
          </div>
          <button
            class="btn btn-warning rounded-full font-bold text-black outline-none hidden md:inline-flex"
          >
            Register
          </button>
          <!-- Sidebar -->
          <div class="inline-block md:hidden">
            <input id="my-drawer-2" type="checkbox" class="drawer-toggle" />
            <div class="drawer-content flex flex-col">
              <div class="bg-transparent">
                <div>
                  <label for="my-drawer-2" aria-label="open sidebar">
                    <svg
                      xmlns="http://www.w3.org/2000/svg"
                      fill="none"
                      viewBox="0 0 24 24"
                      class="inline-block h-6 w-6 stroke-current"
                    >
                      <path
                        stroke-linecap="round"
                        stroke-linejoin="round"
                        stroke-width="2"
                        d="M4 6h16M4 12h16M4 18h16"
                      ></path>
                    </svg>
                  </label>
                </div>
              </div>
            </div>
            <div class="drawer-side">
              <label
                for="my-drawer-2"
                aria-label="close sidebar"
                class="drawer-overlay"
              ></label>
              <ul class="menu bg-base-200 min-h-full w-50 p-4">
                <!-- Sidebar content here -->
                <li class="gap-2">
                  <a class="btn rounded-full btn-warning text-black">Service</a>
                  <a class="btn rounded-full btn-warning text-black">Blog</a>
                  <a class="btn rounded-full btn-warning text-black"
                    >About Us</a
                  >
                  <a class="btn rounded-full btn-warning text-black">Contact</a>
                </li>
              </ul>
            </div>
          </div>
        </div>
      </nav>
      <section class="container mx-auto px-2 md:px-0 pt-20">
        <div
          class="flex flex-col md:flex-row justify-between items-center gap-10"
        >
          <div class="left space-y-5 w-full md:w-2/3">
            <h2
              class="text-7xl md:text-8xl lg:text-9xl font-semibold tracking-tight"
            >
              We make you learn language easily!
            </h2>
            <p class="text-xl">
              We help you learn language easily, witjh small lessons , you`ll
              earn points and unlock new levels while improving you rel world
              communications.
            </p>
            <form class="flex gap-5">
              <input
                type="email"
                placeholder="Enter your email"
                class="rounded-full pl-5 outline-none bg-gray-200 border-none w-58"
              />
              <button
                type="submit"
                class="btn btn-warning rounded-full text-black"
              >
                Get Started
              </button>
            </form>
          </div>
          <div class="right">
            <img src="./Assets/mobile.png" alt="" class="h-full" />
          </div>
        </div>
      </section>
    </header>
  </body>
</html>
